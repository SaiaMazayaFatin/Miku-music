spring:
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false

server:
  port: 2333
  address: 127.0.0.1

lavalink:
  server:
    password: "${LAVALINK_PASSWORD:miku_password}"
    # Disable old built-in YouTube source (use plugins instead)
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.3"
      snapshot: false

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - WEB
      - WEBEMBEDDED
      - ANDROID_VR
  lavasrc:
    providers:
      - "ytmsearch:%QUERY%"
      - "ytsearch:%QUERY%"
    sources:
      youtube: true
